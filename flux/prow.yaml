# Prow deployment - 3-stage dependency chain:
# 1. prow-crds: CRDs must exist before anything else
# 2. prow-build-images: Kubernetes Job that builds and pushes all Prow images
# 3. prow-charts: Prow components that depend on images from step 2

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prow-crds
  namespace: flux-system
spec:
  interval: 60m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/prow/crds
  prune: true
  dependsOn:
  - name: ack-pod-identities
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prow-build-images
  namespace: flux-system
spec:
  interval: 60m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/prow/build-images
  prune: false
  force: true
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  dependsOn:
  - name: prow-crds
  - name: ack-pod-identities
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prow-charts
  namespace: flux-system
spec:
  interval: 60m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/prow/charts
  prune: true
  targetNamespace: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  dependsOn:
  - name: prow-build-images
