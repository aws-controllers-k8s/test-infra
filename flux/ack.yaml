# ACK self-managed cluster — full dependency chain:
#
#   ack-capability-role (no deps) ─→ ack-capability ─→ ack-cluster ─┬─→ ack-addons (+ ack-addons-roles)
#   ack-addons-roles (depends on capability) ──────────────────────┘ └─→ ack-pod-identities (+ ack-pod-identity-roles)
#   ack-pod-identity-roles (depends on capability) ────────────────────→ ack-prow
#                                                                        ack-flux
#
# The capability role is created by Terraform and adopted by ACK (adopt-or-create).
# The ack-capability-role Kustomization ensures ACK reconciles policy drift.
#
# Each kustomization uses wait: true so Flux performs health checks on ALL
# reconciled resources before downstream dependents proceed.
# interval: 60m for drift detection (git pushes trigger immediate reconciliation).

# --- Roles (no dependencies, start immediately) ---
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ack-capability-role
  namespace: flux-system
spec:
  interval: 60m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/ack/capability/role
  prune: true
  deletionPolicy: WaitForTermination
  targetNamespace: ack-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ack-addons-roles
  namespace: flux-system
spec:
  interval: 60m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/ack/cluster/addons/roles
  prune: true
  deletionPolicy: WaitForTermination
  targetNamespace: ack-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  dependsOn:
  - name: ack-capability
  wait: true

# --- Capability (role already exists via Terraform; no dependency needed) ---
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ack-capability
  namespace: flux-system
spec:
  interval: 60m
