# Single NodePool for all cluster workloads.
# Built-in `general-purpose` pool is disabled in cluster.yaml to avoid
# spinning up small instances that hit the pod capacity limit.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: prow-compute
spec:
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["c6a.8xlarge"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "128"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1h
