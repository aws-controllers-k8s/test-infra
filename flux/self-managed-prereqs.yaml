# Pre-requisites for self-managed cluster (IAM role must exist before capability)
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: self-managed-prereqs
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/self-managed/prereqs
  prune: false
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  dependsOn:
  - name: flux-self
