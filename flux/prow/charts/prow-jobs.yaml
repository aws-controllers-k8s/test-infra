apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prow-jobs
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./prow/jobs
  prune: false  # job-config ConfigMap is managed by the substitutor Job, not Flux directly
  force: true   # Required to recreate the job-config-substitutor Job on each reconciliation
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
    - kind: ConfigMap
      name: prow-version
