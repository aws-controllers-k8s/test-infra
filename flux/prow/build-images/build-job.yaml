# One-shot Job that builds and pushes all Prow images using ack-build-tools.
# Uses the builder image pushed during Terraform bootstrap.
# Runs in the cluster where there are no corporate proxy issues.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: prow-build-images
  namespace: test-pods
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: post-submit-service-account
      restartPolicy: Never
      containers:
      - name: builder
        image: ${PROW_IMAGES_REPO_URI}:prow-build-prow-images-latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          # Checkout source
          git clone --branch ${TEST_INFRA_BRANCH} https://github.com/${TEST_INFRA_ORG}/${TEST_INFRA_REPO} /workspace
          cd /workspace

          ./prow/jobs/tools/cmd/build-prow-images.sh
        env:
        - name: PROW_IMAGES_REPO_URI
          value: "${PROW_IMAGES_REPO_URI}"
        - name: PROW_IMAGES_REPO_NAME
          value: "${STACK_NAME}-prow-images"
        - name: TEST_INFRA_ORG
          value: "${TEST_INFRA_ORG}"
        - name: TEST_INFRA_REPO
          value: "${TEST_INFRA_REPO}"
        - name: TEST_INFRA_BRANCH
          value: "${TEST_INFRA_BRANCH}"
        - name: REPO_NAME
          value: "${TEST_INFRA_REPO}"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: prowjob-github-pat-token
              key: token
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        securityContext:
          privileged: true
