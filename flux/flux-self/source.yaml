# Flux GitRepository source - controls where Flux syncs from.
# Change the url or branch here, push to your current branch,
# and Flux will pick up the new source on next reconciliation.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: test-infra
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/gustavodiaz7722/ack-test-infra
  ref:
    branch: flux-v2-api-upgrade
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: test-infra
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: test-infra
