# Prometheus + Grafana monitoring stack for Prow
# Deploys kube-prometheus-stack with Prow-specific scrape configs and dashboards
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./flux/prometheus
  prune: true
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: self-managed-vars
  dependsOn:
  - name: prow-charts
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-dashboards
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: test-infra
  path: ./prow/prometheus-dashboards
  prune: true
  targetNamespace: prometheus
  dependsOn:
  - name: prometheus
