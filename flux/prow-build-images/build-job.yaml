# One-shot Job that builds and pushes all Prow images using ack-build-tools.
# Uses the builder image pushed during Terraform bootstrap.
# Runs in the cluster where there are no corporate proxy issues.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: prow-build-images
  namespace: test-pods
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: post-submit-service-account
      restartPolicy: Never
      containers:
      - name: builder
        image: ${PROW_IMAGES_REPO_URI}:prow-build-prow-images-latest
        command:
        - /bin/bash
        - -c
        - |
          # Login to public ECR
          aws ecr-public get-login-password --region us-east-1 | \
            buildah login -u AWS --password-stdin public.ecr.aws

          # Checkout source
          git clone --branch ${TEST_INFRA_BRANCH} https://github.com/${TEST_INFRA_ORG}/${TEST_INFRA_REPO} /workspace
          cd /workspace

          # Resolve image repo in config
          export PROW_IMAGE_REPO="${PROW_IMAGES_REPO_URI}"
          envsubst < ./prow/jobs/images_config.yaml > /tmp/images_config.yaml
          envsubst < ./prow/plugins/images_config.yaml > /tmp/plugins_images_config.yaml
          envsubst < ./prow/agent-workflows/images_config.yaml > /tmp/agent_workflows_images_config.yaml

          # Build and push all job images
          ack-build-tools build-prow-images \
            --images-config-path /tmp/images_config.yaml \
            --jobs-config-path ./prow/jobs/jobs_config.yaml \
            --jobs-templates-path ./prow/jobs/templates/ \
            --jobs-output-path /dev/null \
            --prow-ecr-repository ${PROW_IMAGES_REPO_NAME}

          # Build and push plugin images
          ack-build-tools build-prow-plugin-images \
            --images-config-path /tmp/plugins_images_config.yaml \
            --prow-ecr-repository ${PROW_IMAGES_REPO_NAME}

          # Build and push agent workflow images
          ack-build-tools build-prow-agent-workflow-images \
            --images-config-path /tmp/agent_workflows_images_config.yaml \
            --prow-ecr-repository ${PROW_IMAGES_REPO_NAME} \
            --agent-workflows-templates-path ./prow/agent-workflows/templates \
            --agent-workflows-output-path /dev/null
        env:
        - name: PROW_IMAGES_REPO_URI
          value: "${PROW_IMAGES_REPO_URI}"
        - name: PROW_IMAGES_REPO_NAME
          value: "${PROW_IMAGES_REPO_NAME}"
        - name: TEST_INFRA_ORG
          value: "${TEST_INFRA_ORG}"
        - name: TEST_INFRA_REPO
          value: "${TEST_INFRA_REPO}"
        - name: TEST_INFRA_BRANCH
          value: "${TEST_INFRA_BRANCH}"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        securityContext:
          privileged: true
