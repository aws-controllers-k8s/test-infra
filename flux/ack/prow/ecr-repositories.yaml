# Private ECR repositories for mirrored Prow images.
# Populated by the prow-mirror Job which copies images from upstream registries.
# force-delete: "true" ensures ACK can delete repos even when they contain images.
---
apiVersion: ecr.services.k8s.aws/v1alpha1
kind: Repository
metadata:
  name: prow-crier
  annotations:
    ecr.services.k8s.aws/force-delete: "true"
spec:
  name: prow/crier
  imageTagMutability: MUTABLE
  imageScanningConfiguration:
    scanOnPush: false
---
