# Private ECR repositories for mirrored Prow images.
# Populated by the prow-mirror Job which copies images from upstream registries.
---
apiVersion: ecr.services.k8s.aws/v1alpha1
kind: Repository
metadata:
  name: prow-crier
spec:
  name: prow/crier
  imageTagMutability: MUTABLE
  imageScanningConfiguration:
    scanOnPush: false
