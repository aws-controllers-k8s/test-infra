# NodePool for e2e test compute and general workloads.
# The Prow control plane runs on a separate, tainted pool (see
# nodepool-control-plane.yaml).
# Built-in `general-purpose` pool is disabled in cluster.yaml to avoid
# spinning up small instances that hit the pod capacity limit.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: prow-compute
spec:
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: prow-compute
      expireAfter: 10h
      requirements:
        - key: "eks.amazonaws.com/instance-family"
          operator: In
          values: ["c6g", "c7g", "c6a", "c6i", "m6a", "m6g", "m6i", "r6a", "r6g", "r6i"]
        - key: "eks.amazonaws.com/instance-size"
          operator: In
          values: ["medium", "large", "xlarge", "2xlarge", "4xlarge", "8xlarge"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "1000"
    memory: 1000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 15m
