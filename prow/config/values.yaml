prowJobNamespace: "prow" # Namespace in which to post the created ProwJobs
podNamespace: "test-pods" # Namespace in which to run test pods

controllerEcrRegistry: ""
ecrPublicAccountId: ""
ecrPublicReaderRoleArn: ""
stage: ""

github:
  organisation: ''
  bot:
    username: ''
    emailID: '' # The suffix given to Github email addresses <username>-<suffix>@users.noreply.github.com
    personalAccessToken:
      secretName: ''

prow:
  domain: ''
  presubmitsBucketName: ''
  tideStatusReconcilerBucketName: ''

dryRun: false

region: 'us-west-2'

ingress:
  create: false
  annotations: {}

# Prow component images — overridden by Flux HelmRelease via
# ${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/prow and ${PROW_VERSION} substitution.
# Defaults here use the upstream registry for local dev/testing.
crier:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/crier
  serviceAccount:
    create: false
    name: ''

deck:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/deck
  service:
    type: 'ClusterIP'
    annotations: {}
  serviceAccount:
    create: false
    name: ''

ghproxy:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/ghproxy
  volumeSize: 100

hook:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/hook
  service:
    type: 'ClusterIP'
  serviceAccount:
    create: false
    name: ''

horologium:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/horologium
  serviceAccount:
    create: false
    name: ''

prowControllerManager:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/prow-controller-manager
  serviceAccount:
    create: false
    name: ''

sinker:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/sinker
  serviceAccount:
    create: false
    name: ''

statusreconciler:
  image: us-docker.pkg.dev/k8s-infra-prow/images/statusreconciler
  serviceAccount:
    create: false
    name: ''

tide:
  scrapeMetrics: false
  image: us-docker.pkg.dev/k8s-infra-prow/images/tide
  serviceAccount:
    create: false
    name: ''

githubApp:
  secret:
   create: false
  appId: ''
  clientId: ''
  cert: ''

githubWebhookToken:
  secret:
    create: false
  hmac: ''

utility_images:
  clonerefs: us-docker.pkg.dev/k8s-infra-prow/images/clonerefs
  entrypoint: us-docker.pkg.dev/k8s-infra-prow/images/entrypoint
  initupload: us-docker.pkg.dev/k8s-infra-prow/images/initupload
  sidecar: us-docker.pkg.dev/k8s-infra-prow/images/sidecar
