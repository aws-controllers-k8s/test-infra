cluster:
  create: true
  # TODO(michaelhtm): Update k8s_version to 1.34.3 once the underlying
  # infra issues are resolved
  k8s_version: 1.30.0

aws:
  region: us-west-2
  # NOTE: token_file is not set because this cluster uses EKS Pod Identity
  # (container credentials endpoint) rather than IRSA (web identity token file).
  # The wrapper.sh script assumes the service role and passes static credentials.

debug:
  enabled: true
  dump_controller_logs: true
