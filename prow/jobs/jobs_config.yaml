# This config is used to generate `jobs.yaml` file using `generator.go` and
# the Go templates.

# Controls whether periodic jobs are included in the generated jobs.yaml.
# Set to false during initial cluster bootstrap to prevent periodic jobs from
# firing before the cluster is fully operational.
periodics_enabled: true

# Adding a service to the `aws_services` array will enable CI/CD

# List of AWS services supported in ACK testing infrastructure.
aws_services:
- acm
- acmpca
- apigateway
- apigatewayv2
- applicationautoscaling
- athena
- autoscaling
- backup
- batch
- bedrock
- bedrockagent
- bedrockagentcorecontrol
- cloudfront
- cloudtrail
- cloudwatch
- cloudwatchevents
- cloudwatchlogs
- codeartifact
- cognitoidentityprovider
- dms
- documentdb
- dsql
- dynamodb
- ec2
- ecr
- ecrpublic
- ecs
- efs
- eks
- elasticache
- elbv2
- emrcontainers
- emrserverless
- eventbridge
- firehose
- globalaccelerator
- glue
- iam
- kafka
- kinesis
- kms
- keyspaces
- lambda
- lambdamicrovms
- memorydb
- mq
- mwaa
- networkfirewall
- networkmanager
- opensearchservice
- opensearchserverless
- organizations
- pipes
- prometheusservice
- quicksight
- ram
- rds
- recyclebin
- route53
- route53resolver
- s3
- s3control
- s3files
- s3tables
- s3vectors
- sagemaker
- secretsmanager
- servicecatalog
- ses
- sfn
- sns
- sqs
- ssm
- transfer
- wafv2

# List of service that will execute a set of tests for CARM
# These service need a CARM_ENABLED environment variable set to true
carm_test_services:
- ecr

# List of service that will execute a set of tests for IAM Role Selector (IRS)
# These service need a IAMRoleSelector feature gate to be set to true
irs_test_services:
- sqs

# Map of service -> additional ACK controllers (as `<name>@<chart-version>`,
# comma-separated for multiple) that must be installed into the service's e2e
# KIND cluster, in addition to any controllers listed in the shared test-config
# ConfigMap. Used for cross-controller reference tests. For example, the kafka
# controller's `securityGroupRefs` tests reference ec2 SecurityGroup resources,
# so the ec2-controller must be running in the test cluster.
additional_controller_test_services:
  kafka: ec2-controller@v1.15.2

# List of AWS services onboarded for soak testing, executing in their Prow
# cluster on every release
soak_test_on_release_service_names: []

# List of AWS services whose controller gets generated and e2e tested whenever
# there is a new code-generator change.
# These controllers are generated and tested to validate that changes in code-generator
# are not breaking changes for service controllers. This helps surface any early
# issues with code-generator release.
# Since there can be some breaking changes, these tests are marked optional for
# prow merge criteria.
code_gen_presubmit_services:
- acm
- apigatewayv2
- cloudfront
- documentdb
- dynamodb
- ec2
- ecr
- efs
- eks
- eventbridge
- iam
- lambda
- pipes
- prometheusservice
- s3

runtime_presubmit_services:
- ecr
- iam
- s3
- ec2
- sagemaker
- sqs

# List of AWS services whose controller gets generated and e2e tested whenever
# there is a new `acktest` library change.
acktest_presubmit_services:
- ecr
- iam
- s3
