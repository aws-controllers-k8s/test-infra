apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
- job-config-job.yaml

configMapGenerator:
# NOTE: job-config ConfigMap is created by the job-config-job (Job resource)
# because it requires variable substitution inside gzipped binary data.
# Flux postBuild substitution cannot operate on binaryData fields, so a Job
# performs envsubst on jobs.yaml, gzips the result, and creates the ConfigMap.
- name: test-config
  namespace: test-pods
  behavior: create
  files:
  - test_config.yaml
- name: label-config
  namespace: test-pods
  behavior: create
  files:
  - labels.yaml
- name: jobs-config
  namespace: test-pods
  behavior: create
  files:
  - jobs_config.yaml