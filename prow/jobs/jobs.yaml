- name: label-sync
  decorate: true
  interval: 6h
  annotations:
    description: Runs label_sync to synchronize GitHub repo labels with the label config defined in label_sync/labels.yaml.
    # karpenter.sh/do-not-evict is deprecated: https://github.com/aws/karpenter-provider-aws/issues/5394
    karpenter.sh/do-not-disrupt: "true"
  labels:
    app: label-sync
    preset-github-secrets: "true"
  agent: kubernetes
  spec:
    serviceAccountName: periodic-service-account
    containers:
    - name: label-sync
      image: ${PROW_MIRROR_REGISTRY}/label_sync:${TOOLS_VERSION}
      resources:
        limits:
          cpu: 1
          memory: "500Mi"
        requests:
          cpu: 1
          memory: "500Mi"
      command:
      - label_sync
      args:
      - --config=/etc/config/labels.yaml
      - --confirm=true
      - --orgs=${TEST_INFRA_ORG}
      - --github-token-path=/etc/github/token
      - --github-endpoint=http://ghproxy.prow.svc.cluster.local
      - --github-endpoint=https://api.github.com
      - --debug
      volumeMounts:
      - name: config
        mountPath: /etc/config
        readOnly: true
    volumes:
    - name: config
      configMap:
        name: label-config
- name: periodic-close
  interval: 6h
  decorate: true
  annotations:
    description: Closes rotten issues after 30d of inactivity
    # karpenter.sh/do-not-evict is deprecated: https://github.com/aws/karpenter-provider-aws/issues/5394
    karpenter.sh/do-not-disrupt: "true"
  labels:
    preset-github-secrets: "true"
  agent: kubernetes
  spec:
    serviceAccountName: periodic-service-account
    containers:
      - image: ${PROW_MIRROR_REGISTRY}/commenter:${TOOLS_VERSION}
        resources:
          limits:
            cpu: 1
            memory: "500Mi"
          requests:
            cpu: 1
            memory: "500Mi"
        command:
          - commenter
        args:
          - --query=org:${TEST_INFRA_ORG} -label:lifecycle/frozen label:lifecycle/rotten
          - --updated=1440h
          - --token=/etc/github/token
          - |-
            --comment=Rotten issues close after 60d of inactivity.
            Reopen the issue with `/reopen`.
            Provide feedback via https://github.com/${TEST_INFRA_ORG}/community.
            /close
          - --template
          - --confirm
          - --ceiling=10
- name: periodic-rotten
  interval: 6h
  decorate: true
  annotations:
    description: Moves stale issues to rotten state after 30d of inactivity
    # karpenter.sh/do-not-evict is deprecated: https://github.com/aws/karpenter-provider-aws/issues/5394
    karpenter.sh/do-not-disrupt: "true"
  labels:
    preset-github-secrets: "true"
  agent: kubernetes
  spec:
    serviceAccountName: periodic-service-account
    containers:
      - image: ${PROW_MIRROR_REGISTRY}/commenter:${TOOLS_VERSION}
        resources:
          limits:
            cpu: 1
            memory: "500Mi"
          requests:
            cpu: 1
            memory: "500Mi"
        command:
          - commenter
        args:
          - --query=org:${TEST_INFRA_ORG} -label:lifecycle/frozen -label:lifecycle/rotten label:lifecycle/stale
          - --updated=1440h
          - --token=/etc/github/token
          - |-
            --comment=Stale issues rot after 60d of inactivity.
            Mark the issue as fresh with `/remove-lifecycle rotten`.
            Rotten issues close after an additional 60d of inactivity.
            If this issue is safe to close now please do so with `/close`.
            Provide feedback via https://github.com/${TEST_INFRA_ORG}/community.
            /lifecycle rotten
          - --template
          - --confirm
          - --ceiling=10
- name: periodic-stale
  interval: 6h
  decorate: true
  annotations:
    description: Adds lifecycle/stale to issues after 90d of inactivity
    # karpenter.sh/do-not-evict is deprecated: https://github.com/aws/karpenter-provider-aws/issues/5394
    karpenter.sh/do-not-disrupt: "true"
  labels:
    preset-github-secrets: "true"
  agent: kubernetes
  spec:
    serviceAccountName: periodic-service-account
    containers:
      - image: ${PROW_MIRROR_REGISTRY}/commenter:${TOOLS_VERSION}
        resources:
          limits:
            cpu: 1
            memory: "500Mi"
          requests:
            cpu: 1
            memory: "500Mi"
        command:
          - commenter
        args:
          - --query=org:${TEST_INFRA_ORG} -label:lifecycle/frozen -label:lifecycle/rotten -label:lifecycle/stale
          - --updated=4320h
          - --token=/etc/github/token
          - |-
            --comment=Issues go stale after 180d of inactivity.
            Mark the issue as fresh with `/remove-lifecycle stale`.
            Stale issues rot after an additional 60d of inactivity and eventually close.
            If this issue is safe to close now please do so with `/close`.
            Provide feedback via https://github.com/${TEST_INFRA_ORG}/community.
            /lifecycle stale
          - --template
          - --confirm
          - --ceiling=10
